networks:
  agent-net:
    driver: bridge

volumes:
  postgres-data:
  qdrant-data:
  redis-data:

services:
  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: map_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multiagent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: map_qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: map_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend (FastAPI Orchestrator)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: map_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      REDIS_HOST: redis
    ports:
      - "8065:8065"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agent-net
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: map_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8065
      NEXT_PUBLIC_WS_URL: ws://localhost:8065
    ports:
      - "3000:3000"
    networks:
      - agent-net
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # Ollama (Local LLM - optional)
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: map_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./docker/ollama:/root/.ollama
    networks:
      - agent-net
    profiles:
      - local-llm
